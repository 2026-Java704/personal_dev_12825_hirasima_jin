<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新規会員登録</title>
</head>
<body>
	<h1>新規会員登録</h1>
	
	<span th:each="msg:${msgList}">
		<msg th:text="${msg}" style="color: red;"></msg>
		<br>
	</span>
	
	<form action="/users/add" method="post">
		<input type="text" name="name" placeholder="お名前">
		<br>
		<input type="text" name="email" placeholder="メールアドレス">
		<br>
		<input type="password" name="password" placeholder="パスワード">
		<br>
		<input type="password" name="passwordConfirm" placeholder="パスワード(確認)">
		<br>
		<button>新規作成</button>
	</form>
		
</body>
</html>
