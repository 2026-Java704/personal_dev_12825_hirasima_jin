<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>レシピ編集</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	
	<h1>レシピ編集</h1>
	
	<form th:action="@{/recipes/update/{id}(id = ${recipe.id})}" method="post">
		料理名
		<br>
		<input type="text" class="textBox" name="name" th:value="${recipe.name}">
		<br>
		カテゴリー
		<br>
		<select name="categoryId">
			<option th:each="category:${categories}" th:value="${category.id}" th:text="${category.name}"
			 th:selected="${category.id == recipe.category.id}"></option>
		</select>
		<br>
		材料
		<br>
		<textarea name="material" th:text="${recipe.material}"></textarea>
		<br>
		レシピ内容
		<br>
		<textarea name="recipeDetail" th:text="${recipe.recipe}"></textarea>
		<br>
		<input type="hidden" name="userId" th:value="${@account.id}">
		<button>編集</button>
	</form>
</body>
</html>
