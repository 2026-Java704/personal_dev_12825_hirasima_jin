<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>レシピ一覧</title>
</head>
<body>
	<h1>レシピ一覧</h1>
	
	[[${@account.name}]]さん、ようこそ
	<br><br>
	
	<!--検索-->
	<form action="/recipes" method="get">
		<input type="text" name="keyword" placeholder="料理名検索" th:value="${keyword}">
		<button>検索</button>
		<br>
	</form>
	
	<!--カテゴリー-->
	<table>
		<tr>
			<td>
				<form action="/recipes" method="get">
					<button>全選択</button>
				</form>
			</td>
			<td  th:each="category:${categories}">
				<form action="/recipes" method="get">
					<input type="hidden" name="categoryId" th:value="${category.id}">
					<button th:text="${category.name}"></button>
				</form>
			</td>
		</tr>
	</table>
	<br>
	
	<table th:each="recipe:${recipes}">
		<tr>
			<td>
				<a th:href="@{/recipes/detail/{id}(id = ${recipe.id})}" th:text="${recipe.name}"></a>
			</td>
		</tr>
	</table>
</body>
</html>
