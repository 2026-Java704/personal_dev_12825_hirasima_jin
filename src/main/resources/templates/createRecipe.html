<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>レシピ投稿</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	
	<h1>レシピ投稿</h1>
	
	<form action="/recipes/add" method="post">
		料理名
		<br>
		<input type="text" class="textBox" name="name" placeholder="料理名">
		<br>
		カテゴリー
		<br>
		<select name="categoryId">
			<option th:each="category:${categories}" th:value="${category.id}" th:text="${category.name}"></option>
		</select>
		<br>
		材料
		<br>
		<textarea name="material"></textarea>
		<br>
		レシピ内容
		<br>
		<textarea name="recipeDetail"></textarea>
		<br>
		<input type="hidden" name="userId" th:value="${@account.id}">
		<button>投稿</button>
	</form>
</body>
</html>
