<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ログイン</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<h1>ログイン</h1>
	
	<msg th:text="${msg}" style="color: red;"></msg>
	
	<form action="/login" method="post">
		<input type="text" class="textBox" name="email" placeholder="メールアドレス">
		<br>
		<input type="password" class="textBox" name="password" placeholder="パスワード">
		<br>
		<button>ログイン</button>
	</form>
	
	<a href="/users/new">新規登録</a>
</body>
</html>
